name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # 注意：cron 表达式最短间隔是 5 分钟，'1/5' 可能不符合标准格式，建议用 '*/5'
  worworkflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'

    - name: Build
      run: go mod tidy && go build -v -o go-download-web ./

    - name: Prepare Website Directory
      # 检出目标仓库到 website 目录，供下载器作为上下文
      uses: actions/checkout@v3
      with:
        repository: 'webra2/webra2.github.io'
        path: website
        token: ${{ secrets.API_TOKEN_GITHUB }}

    - name: Download ChronoDivide
      run: |
        # Ubuntu Runner 自带 google-chrome，通常直接运行即可
        # 如果程序里写死了路径，可以在这里做个 alias 或者 export
        ./go-download-web

    - name: Inspect Downloaded Files
      run: |
        echo "检查下载结果..."
        ls -R website/

    - name: Upload Website Artifacts
      # 使用官方 Action 上传产物
      uses: actions/upload-artifact@v4
      with:
        name: chronodivide-latest-build
        path: website/
        # 设置保留天数（可选）
        retention-days: 90
